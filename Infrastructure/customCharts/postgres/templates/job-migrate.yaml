apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-migrate
  namespace: default
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: admin-password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: admin-password
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "Starting migrations..."

              for f in /work/*.sql; do
                [ -e "$f" ] || { echo "No .sql files found in /work"; exit 0; }
                echo "Running migration: $f"
                psql \
                  -h postgres \
                  -U postgres \
                  -d postgres \
                  -v ON_ERROR_STOP=1 \
                  -f "$f"
              done

              echo "Migrations complete."
          volumeMounts:
            - name: migrate-sql
              mountPath: /work
            - name: rls
              mountPath: /tmp/rls.sql
              subPath: rls.sql
      volumes:
        - name: migrate-sql
          configMap:
            name: postgres-migrate-sql
        - name: rls
          configMap:
            name: rls-config-sql
            items:
              - key: rls.sql
                path: rls.sql
