---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: default
  labels:
    app.kubernetes.io/instance: pgadmin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: pgadmin
spec:
  type: {{ .Values.service.type }}
  selector:
    app: pgadmin
  ports:
    - name: pgadmin
      port: {{ .Values.service.port}}
      targetPort: {{ .Values.service.port }}
